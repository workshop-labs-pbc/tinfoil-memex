cvm-version: 0.7.1
cpus: 16
memory: 65536

containers:
  - name: "memex"
    image: "us-central1-docker.pkg.dev/workshop-labs-pbc/pollux-docker/cpu@sha256:a0316ffbb5eec885435fcac696e7fc5176f2821d232e972cdb8bd09cfa8bc665"
    entrypoint: ["python", "-m", "src.memex.main", "--prod", "--port", "8001"]
    env:
      - KEY_MODE: "real_keys"
      - LOG_LEVEL: "INFO"
      - EMBEDDING_SERVER_URL: "https://confidential-pollux-embeddings.debug.wsl.containers.tinfoil.dev"
    secrets:
      - DATABASE_URL
      - TINFOIL_API_KEY
      - EXA_API_KEY
      - INTERNAL_SERVICE_SECRET

shim:
  upstream-port: 8001
  paths:
    - /ping
    - /set_dek
    - /v1/context/*
    - /v1/personalize/*
    - /v1/user/*
